<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROKA Bot | AI Assistant</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --container-bg: rgba(255, 255, 255, 0.9);
            --text-color: #2d3436;
            --bot-bubble: #e1f5fe;
            --user-bubble: #6c5ce7;
            --user-text: #ffffff;
            --accent: #6c5ce7;
        }

        [data-theme="dark"] {
            --bg-gradient: linear-gradient(135deg, #2d3436 0%, #000000 100%);
            --container-bg: rgba(45, 52, 54, 0.9);
            --text-color: #dfe6e9;
            --bot-bubble: #3d464d;
            --user-bubble: #a29bfe;
            --user-text: #ffffff;
            --accent: #a29bfe;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            transition: all 0.4s ease;
        }

        .chat-container {
            width: 400px;
            height: 600px;
            background: var(--container-bg);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .header {
            padding: 20px;
            background: var(--accent);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h2 { margin: 0; font-size: 1.2rem; letter-spacing: 1px; }

        #theme-toggle {
            cursor: pointer;
            font-size: 1.2rem;
            transition: transform 0.3s ease;
        }

        #theme-toggle:hover { transform: rotate(20deg); }

        #chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.4;
            animation: fadeIn 0.3s ease forwards;
        }

        .bot {
            align-self: flex-start;
            background: var(--bot-bubble);
            color: var(--text-color);
            border-bottom-left-radius: 4px;
        }

        .user {
            align-self: flex-end;
            background: var(--user-bubble);
            color: var(--user-text);
            border-bottom-right-radius: 4px;
        }

        .input-area {
            padding: 20px;
            display: flex;
            gap: 10px;
            background: rgba(0,0,0,0.05);
        }

        input {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            outline: none;
            background: var(--container-bg);
            color: var(--text-color);
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { opacity: 0.8; transform: scale(1.05); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Scrollbar styling */
        #chat-box::-webkit-scrollbar { width: 5px; }
        #chat-box::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">
        <h2>ROKA Bot</h2>
        <i class="fas fa-moon" id="theme-toggle"></i>
    </div>
    
    <div id="chat-box">
        <div class="message bot">Hi! I'm ROKA. How can I help you today?</div>
    </div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="Type a message..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<script>
    const themeToggle = document.getElementById('theme-toggle');
    const body = document.body;

    // Light/Dark Mode Logic
    themeToggle.addEventListener('click', () => {
        const isDark = body.getAttribute('data-theme') === 'dark';
        body.setAttribute('data-theme', isDark ? 'light' : 'dark');
        themeToggle.className = isDark ? 'fas fa-moon' : 'fas fa-sun';
    });

    function handleKeyPress(e) {
        if (e.key === 'Enter') sendMessage();
    }

    async function sendMessage() {
        const input = document.getElementById('user-input');
        const chatBox = document.getElementById('chat-box');
        const message = input.value.trim();

        if (!message) return;

        // Add user message
        chatBox.innerHTML += `<div class="message user">${message}</div>`;
        input.value = '';
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message })
            });
            const data = await response.json();
            
            // Add bot response
            setTimeout(() => {
                chatBox.innerHTML += `<div class="message bot">${data.response}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 500);
        } catch (err) {
            console.error("Error fetching chat:", err);
        }
    }
</script>

</body>
</html>
